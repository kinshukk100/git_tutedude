<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do Page</title>
</head>
<body>
  <h1>To-Do Page</h1>

  <form>

     <label for="item-id">Item ID</label>
    <br>
    <input id="item-id" name="item_id" type="text">
    <br><br>

    <label for="item-uuid">Item UUID</label>
    <br>
    <input id="item-uuid" name="item_uuid" type="text">
    <br><br>

    <label for="item-hash">Item Hash</label>
    <br>
    <input id="item-hash" name="item_hash" type="text">
    <br><br>

    <label for="item-name">Item Name</label>
    <br>
    <input id="item-name" name="item_name" type="text">
    <br><br>

    <label for="item-description">Item Description</label>
    <br>
    <textarea id="item-description" name="item_description" rows="5" cols="30"></textarea>
    <br><br>

    <button type="submit">Submit</button>
  </form>
</body>
</html>
